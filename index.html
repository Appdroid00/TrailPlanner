<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>TrailPlanner</title>

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/mobile.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header class="topbar">

  <div class="brand-heading">

    <div class="app-logo" aria-hidden="true">
      <img src="assets/trailplanner-logo-icon.png" alt="" aria-hidden="true">
    </div>

    <div>

    <h1>
      TrailPlanner
    </h1>

    <p>
      Plan smarter. Travel better.
    </p>

  </div>

  </div>

</header>

<section class="hero">

  <h2>
    My Adventures
  </h2>

  <p class="hero-note">
    Open a trip to continue planning.
  </p>

  <button id="openTripModal">

    New Trip

  </button>

</section>

<section class="stats">

  <div class="stat-card">

    <h3 id="tripCount">
      0
    </h3>

    <p>
      Total Trips
    </p>

  </div>

  <div class="stat-card">

    <h3 id="budgetTotal">
      PHP 0
    </h3>

    <p>
      Total Budget
    </p>

  </div>

  <div class="stat-card">

    <h3 id="upcomingTrips">
      0
    </h3>

    <p>
      Upcoming
    </p>

  </div>

</section>

<section>

  <h2>
    My Trips
  </h2>

  <div
    id="tripList"
    class="trip-grid">

    Loading trips...

  </div>

</section>

<!-- CREATE TRIP MODAL -->

<div
  id="tripModal"
  class="modal">

  <div class="modal-content">

    <button
      id="closeTripModal"
      class="modal-close-btn"
      type="button"
      aria-label="Close">

      x

    </button>

    <h2>
      Create Trip
    </h2>

    

<form id="tripForm">

  <div class="form-group">

    <label for="destination">
      Destination
    </label>

    <input
      type="text"
      id="destination"
      placeholder="Destination"
      required>

  </div>

  <div class="form-group">

    <label for="startDate">
      Start Date
    </label>

    <input
      type="date"
      id="startDate"
      required>

  </div>

  <div class="form-group">

    <label for="endDate">
      End Date
    </label>

    <input
      type="date"
      id="endDate"
      required>

  </div>

  <div class="form-group">

    <label for="budget">
      Budget
    </label>

    <input
      type="number"
      id="budget"
      placeholder="Budget">

  </div>

  <div class="form-group">

    <label for="travelers">
      Travelers
    </label>

    <input
      type="number"
      id="travelers"
      min="1"
      value="1">

  </div>

  <button type="submit">

    Save Trip

  </button>

</form>

  </div>

</div>

<!-- DELETE TRIP MODAL -->

<div
  id="deleteTripModal"
  class="modal-overlay">

  <div class="delete-modal">

    <h2>
      Delete Trip
    </h2>

    <p>
      Delete this trip?
    </p>

    <div class="modal-actions">

      <button
        type="button"
        id="cancelDeleteTripBtn"
        class="secondary-btn">

        Cancel

      </button>

      <button
        type="button"
        id="confirmDeleteTripBtn"
        class="danger-btn">

        Delete

      </button>

    </div>

  </div>

</div>

<nav class="mobile-nav">

  <button id="dashboardMobileHomeLink" type="button" class="mobile-nav-btn" data-href="index.html">
    <svg class="mobile-nav-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3 11.5 12 4l9 7.5"></path>
      <path d="M5 10.5V20h5v-6h4v6h5v-9.5"></path>
    </svg>
    <span>Home</span>
  </button>

  <button id="dashboardMobileTripsLink" type="button" class="mobile-nav-btn" data-href="#tripList">
    <svg class="mobile-nav-icon" viewBox="0 0 24 24" aria-hidden="true">
      <rect x="7" y="6" width="10" height="14" rx="2"></rect>
      <path d="M9 6V4h6v2"></path>
      <path d="M5 8v10"></path>
      <path d="M19 8v10"></path>
    </svg>
    <span>Trips</span>
  </button>

  <button id="dashboardMobileProfileLink" type="button" class="mobile-nav-btn" data-href="profile.html">
    <svg class="mobile-nav-icon" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="8" r="4"></circle>
      <path d="M4 21a8 8 0 0 1 16 0"></path>
    </svg>
    <span>Profile</span>
  </button>

</nav>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/trips.js"></script>

</body>

</html>
