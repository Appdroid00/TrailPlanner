<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Trip Details</title>

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/mobile.css">
<link rel="stylesheet" href="css/trip.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="container">

<header class="topbar">

<div>

<h1 id="tripTitle">
Loading...
</h1>

<p id="tripDates">
Loading...
</p>

</div>

<a
href="index.html"
class="back-btn">

← Back to Dashboard

</a>

</header>

<section class="stats">

<div class="stat-card">

<h3 id="tripBudget">
₱0
</h3>

<p>
Budget
</p>

</div>

<div class="stat-card">

<select id="tripStatusSelect">

<option value="Planning">
Planning
</option>

<option value="Booked">
Booked
</option>

<option value="In Progress">
In Progress
</option>

<option value="Completed">
Completed
</option>

</select>

<p>
Status
</p>

</div>

<div class="stat-card">

<h3 id="tripTravelers">
1
</h3>

<p>
Travelers
</p>

</div>

</section>

<section class="trip-tabs">

<button
class="tab-btn"
onclick="showTab('overview')">

Overview

</button>

<button
class="tab-btn"
onclick="showTab('itinerary')">

Itinerary

</button>

<a
id="budgetPageBtn"
class="tab-btn"
href="#">

Budget

</a>

<a
id="packingPageBtn"
class="tab-btn"
href="#">

Packing

</a>

<button
class="tab-btn"
onclick="showTab('notes')">

Notes

</button>

</section>

<section
id="overview"
class="tab-content">

<h2>
Trip Overview
</h2>

<div id="overviewContent">

Loading...

</div>

</section>

<section
id="itinerary"
class="tab-content"
style="display:none;">

<div class="itinerary-layout">

<div class="itinerary-list-panel">

<div class="section-header">

<h2>
Itinerary
</h2>

<button
id="openActivityModal"
class="add-btn">

+ Add Activity

</button>

</div>

<div class="itinerary-table-wrapper">

<table class="itinerary-table">

<thead>

<tr>

<th>Date</th>
<th>Time</th>
<th>Activity</th>
<th>Location</th>
<th>Category</th>
<th>Status</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="itineraryList">

<tr>

<td colspan="7">

No activities yet.

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</section>

<section
id="notes"
class="tab-content"
style="display:none;">

<h2>
Trip Notes
</h2>

<textarea
id="tripNotes"
rows="8"
style="
width:100%;
padding:15px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:15px;
"></textarea>

<button
id="saveNotesBtn"
class="tab-btn">

Save Notes

</button>

</section>

</div>

<!-- ACTIVITY MODAL -->

<div
id="activityModal"
class="modal">

<div class="modal-content">

<button
id="closeActivityModal"
class="modal-close-btn"
type="button">

×

</button>

<h2 id="activityFormTitle">
Add Activity
</h2>

<form id="activityForm">

<input
type="date"
id="activityDate"
required>

<input
type="time"
id="activityTime">

<input
type="text"
id="activityTitle"
placeholder="Activity Name"
required>

<input
type="text"
id="activityLocation"
placeholder="Location">

<select id="activityCategory">

<option value="Transport">
Transport
</option>

<option value="Hotel">
Hotel
</option>

<option value="Sightseeing">
Sightseeing
</option>

<option value="Food">
Food
</option>

<option value="Shopping">
Shopping
</option>

<option value="Adventure">
Adventure
</option>

<option value="Other">
Other
</option>

</select>

<textarea
id="activityNotes"
rows="4"
placeholder="Notes"></textarea>

<button
type="submit"
id="saveActivityBtn">

Add Activity

</button>

<button
type="button"
id="cancelEditBtn"
style="display:none;">

Cancel Edit

</button>

</form>

</div>

</div>
<!-- DELETE ACTIVITY MODAL -->

<div
  id="deleteActivityModal"
  class="modal-overlay">

  <div class="delete-modal">

    <h2>Delete Item</h2>

    <p>
      Are you sure you want to delete this item?
    </p>

    <div class="modal-actions">

      <button
        type="button"
        id="cancelDeleteActivityBtn"
        class="secondary-btn">

        Cancel

      </button>

      <button
        type="button"
        id="confirmDeleteActivityBtn"
        class="danger-btn">

        Delete Item

      </button>

    </div>

  </div>

</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/trip.js"></script>
<script src="js/itinerary.js"></script>

</body>

</html>
