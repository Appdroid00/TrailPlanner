<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
TrailPlanner Login
</title>

<link
rel="stylesheet"
href="css/login.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="login-container">

  <div class="login-card">

    <div class="login-logo" aria-hidden="true">
      <img src="assets/trailplanner-logo-icon.png" alt="" aria-hidden="true">
    </div>

    <h1>
      TrailPlanner
    </h1>

    <p class="subtitle">
      Plan smarter. Travel better.
    </p>

    <input
      type="text"
      id="fullName"
      class="signup-only"
      placeholder="Full Name">

    <input
      type="email"
      id="email"
      placeholder="Email Address">

    <input
      type="password"
      id="password"
      placeholder="Password">

    <input
      type="password"
      id="confirmPassword"
      class="signup-only"
      placeholder="Confirm Password">

    <button
      id="loginBtn"
      class="primary-btn">

      Sign In

    </button>

    <button
      id="signupBtn"
      class="secondary-btn">

      Create Account

    </button>

    <p id="message"></p>

  </div>

</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

</body>

</html>
