<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/mobile.css">
<link rel="stylesheet" href="css/profile.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="container">

<header class="topbar">

  <div>

    <h1>
      Profile
    </h1>

    <p id="profileEmail">
      Loading...
    </p>

  </div>

  <a
    href="index.html"
    class="back-btn">

    Back to Dashboard

  </a>

</header>

<section class="profile-layout">

  <div class="profile-panel">

    <div class="section-header">

      <div>

        <p class="profile-eyebrow">
          Travel Preferences
        </p>

        <h2>
          Account Details
        </h2>

      </div>

    </div>

    <form id="profileForm">

      <div class="form-group">

        <label for="fullName">
          Full Name
        </label>

        <input
          type="text"
          id="fullName"
          placeholder="Full Name">

      </div>

      <div class="form-group">

        <label for="homeCity">
          Home City
        </label>

        <input
          type="text"
          id="homeCity"
          placeholder="Example: Manila">

      </div>

      <div class="form-group">

        <label for="homeCountry">
          Home Country
        </label>

        <input
          type="text"
          id="homeCountry"
          placeholder="Example: Philippines">

      </div>

      <div class="form-group">

        <label for="preferredCurrency">
          Preferred Currency
        </label>

        <select id="preferredCurrency">
          <option value="PHP">PHP</option>
          <option value="USD">USD</option>
          <option value="JPY">JPY</option>
          <option value="KRW">KRW</option>
          <option value="EUR">EUR</option>
        </select>

      </div>

      <div class="form-group">

        <label for="travelStyle">
          Travel Style
        </label>

        <select id="travelStyle">
          <option value="">Select style</option>
          <option value="Solo">Solo</option>
          <option value="Couple">Couple</option>
          <option value="Family">Family</option>
          <option value="Group">Group</option>
          <option value="Backpacking">Backpacking</option>
          <option value="Business">Business</option>
        </select>

      </div>

      <div class="form-group">

        <label for="defaultBudget">
          Default Budget
        </label>

        <input
          type="number"
          id="defaultBudget"
          min="0"
          step="0.01"
          placeholder="0">

      </div>

      <button
        type="submit"
        class="profile-save-btn">

        Save Profile

      </button>

      <p id="profileMessage"></p>

    </form>

    <div class="profile-account-actions">

      <button
        id="logoutBtn"
        type="button"
        class="profile-logout-btn">

        Logout

      </button>

    </div>

  </div>

</section>

</div>

<nav class="mobile-nav" aria-label="Mobile navigation">

  <button id="profileMobileHomeLink" type="button" class="mobile-nav-btn" data-href="index.html">
    <svg class="mobile-nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5"></path><path d="M5 10.5V20h5v-6h4v6h5v-9.5"></path></svg>
    <span>Home</span>
  </button>

  <button id="profileMobileTripsLink" type="button" class="mobile-nav-btn" data-href="index.html#tripList">
    <svg class="mobile-nav-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="7" y="6" width="10" height="14" rx="2"></rect><path d="M9 6V4h6v2"></path><path d="M5 8v10"></path><path d="M19 8v10"></path></svg>
    <span>Trips</span>
  </button>

  <button id="profileMobileBudgetLink" type="button" class="mobile-nav-btn" data-href="index.html">
    <svg class="mobile-nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h14a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3H5a2 2 0 0 1-2-2V8a1 1 0 0 1 1-1Z"></path><path d="M16 12h5"></path><path d="M17.5 15a1.5 1.5 0 0 1 0-3"></path></svg>
    <span>Budget</span>
  </button>

  <button type="button" class="mobile-nav-btn" aria-current="page">
    <svg class="mobile-nav-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"></circle><path d="M4 21a8 8 0 0 1 16 0"></path></svg>
    <span>Profile</span>
  </button>

</nav>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/profile.js"></script>

</body>

</html>
